name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint
        run: ruff check app/ tests/

      - name: Run tests
        run: pytest tests/ -v

  build:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t optivault-api:${{ github.sha }} -f backend/Dockerfile backend

      - name: Build worker image
        run: docker build -t optivault-worker:${{ github.sha }} -f backend/Dockerfile.worker backend

      # Next step here would be: log in to ECR, push both images with the
      # commit SHA as tag, then update the ECS service to the new task
      # definition revision. Left as a follow-up once an AWS account +
      # ECR repos exist -- see deploy/README.md.
